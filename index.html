    <script>
      // SPA redirect for GitHub Pages 404.html fallback
      (function () {
        var redirect = sessionStorage.getItem("gh_redirect");
        if (redirect && redirect !== location.href) {
          sessionStorage.removeItem("gh_redirect");
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
