name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Compute base path
        id: base
        run: |
          # For user/organization pages (repo name = <user>.github.io), base = "/"
          # For project pages, base = "/<repo>/"
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "base=/" >> $GITHUB_OUTPUT
          else
            echo "base=/${REPO}/" >> $GITHUB_OUTPUT
          fi

      - name: Build (static SPA for GitHub Pages)
        env:
          BASE_PATH: ${{ steps.base.outputs.base }}
          ASSET_ORIGIN: https://buingocphuonglinh.lovable.app
        run: bunx vite build --config vite.gh-pages.config.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
